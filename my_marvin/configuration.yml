jenkins:
  systemMessage: "Hello! Welcome to my Jenkins instance :)"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
        - id: "jigglypuff"
          name: "Jigglypuff"
          password: "${JENKINS_JIGGLYPUFF_PASSWORD}"

jobs:
  - file: /var/jenkins_home/job_dsl.groovy
